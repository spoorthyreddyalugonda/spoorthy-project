.gallery{

.place{
position:relative;
overflow:hidden;

}

.place img{
width:100%;
height:350px;
object-fit:cover;
transition:0.4s;
}

.place:hover img{
transform:scale(1.1);
}


.place h3{

bottom:20px;
left:20px;
background:rgba(255,255,255,0.8);
padding:10px 15px;
border-radius:5px;
}

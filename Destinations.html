<!DOCTYPE html>
<html>
    <head>
        <title>Tourist</title>
        <style>
         body{
                background-color:azure;
                overflow: hidden;
                margin: 0px;
                padding: 0px;

            }
            nav{
                background-color: black;
                text-align: center;
                font-size: 30px;
                border: 20px;
                padding: 10px;
                font-weight: bold;
            }
            nav ul li a{
                
                color:white;
               
            
            }
            li{
                display: inline;
                margin-right: 100px;
                color: azure;
            }
            .destinations {
    padding: 10px 50px 80px;
    text-align: center;
    background: #f4f6f9;
}

.section-title {
    font-size: 36px;
    margin-bottom: 50px;
}

.destination-container {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
}

.destination-card {
    position: relative;
    width: 350px;
    height: 500px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    cursor: pointer;
}

.destination-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.6s ease;
}

.destination-card:hover img {
    transform: scale(1.1);
}

.destination-content {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    color: white;
    text-align: left;
}

.destination-content h3 {
    font-size: 24px;
    margin-bottom: 5px;
}

.destination-content p {
    font-size: 16px;
}

            </style>
    </head>
    <body>
        <body>
        <nav>
            <ul>

                </li>
            </ul>
        </nav>
        <section id="places" class="destinations">
    <h2 class="section-title">Top Destinations</h2>

    <div class="destination-container">

        <div class="destination-card">
            <img src="taj mahal - Copy.jpg" alt="Taj Mahal">
            <div class="destination-content">
                <h3>Taj Mahal</h3>
                <p>Agra, India</p>
            </div>
        </div>

        <div class="destination-card">
            <img src="goa.jpg" alt="Goa">
            <div class="destination-content">
                <h3>Goa</h3>
                <p>Beach Paradise</p>
            </div>
        </div>

        <div class="destination-card">
            <img src="kerala.jpg" alt="Kerala">
            <div class="destination-content">
                <h3>Kerala</h3>

            </div>
        </div>

    </div>
</section>

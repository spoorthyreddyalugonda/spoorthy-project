<html lang="en">
<head>
    <title>Tourist</title>
    <style>
body{
                background-color:azure;
                overflow: hidden;
                margin: 0px;
                padding: 0px;

            }
            nav{
                background-color: black;
                text-align: center;
                font-size: 30px;
                border: 20px;
                padding: 10px;
                font-weight: bold;
            }
            nav ul li a{
                
                color:white;
               
            
            }
            li{
                display: inline;
                margin-right: 100px;

            }
            /* FOOD SECTION */
.food-section {
    padding: 100px 50px;
    background: #ffffff;   /* White background */
    text-align: center;
}

.food-title {
    font-size: 40px;
    color: #222;
    margin-bottom: 60px;
    letter-spacing: 2px;
}

/* Container */
.food-container {
    display: flex;
    flex-direction: column;
    gap: 50px;
}

/* FOOD CARD */
.food-card {
    position: relative;
    height: 300px;   /* Reduced height */
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    cursor: pointer;
}

/* Image */
.food-card img {
    width: 100%;
    height: 100%;
    object-fit: contain;   /* Shows full image clearly */
    background: #f5f5f5;   /* Light background behind image */
    transition: 0.4s ease;
}

/* Soft Hover Effect */
.food-card:hover img {
    transform: scale(1.05);
}

/* Overlay Content */
.food-content {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 25px;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    color: white;
    text-align: left;
}

.food-content h3 {
    font-size: 26px;
    margin-bottom: 8px;
}

.food-content p {
    font-size: 15px;
    margin-bottom: 12px;
}

/* Button */
.food-btn {
    display: inline-block;
    padding: 8px 18px;
    background: #ff9800;
    color: white;
    text-decoration: none;
    border-radius: 20px;
    font-weight: bold;
    transition: 0.3s;
}

.food-btn:hover {
    background: #e65100;
}
html {
    scroll-behavior: smooth;
}

body {
    overflow-y: auto;
}


    </style>
</head>

        <!-- Sweets -->

        </div>
    </div>
</section>
